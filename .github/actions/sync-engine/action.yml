name: 'Sync Engine'
description: 'Core logic for project board synchronization'
inputs:
  backfill:
    description: 'Backfill repo (org/repo)'
    required: false
    default: ''
  window_hours:
    description: 'Update window (hours)'
    required: false
    default: '2'
  verbose:
    description: 'Enable verbose logging'
    required: false
    default: 'true'
  github_token:
    description: 'GitHub Token'
    required: true
  github_author:
    description: 'GitHub username to monitor'
    required: false
    default: 'DerekRoberts'
  project_url:
    description: 'GitHub Project URL'
    required: false
    default: 'https://github.com/orgs/bcgov/projects/16'
  config_file:
    description: 'Path to rules.yml'
    required: false
    default: 'rules.yml'

runs:
  using: 'node24'
  main: '../../../dist/index.js'
