name: Analysis

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review]
  schedule:
    - cron: "0 11 * * 0" # 3 AM PST = 12 PM UTC, runs Sundays
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write
  issues: write
  pull-requests: read

jobs:
  test-and-sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"
      - name: Run Tests
        shell: bash
        run: |
          npm ci
          npm test

  trivy:
    name: Trivy Security Scan
    if: (! github.event.pull_request.draft)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6

      - name: Cache Trivy DB
        uses: actions/cache@v4
        with:
          path: .trivycache
          key: ${{ runner.os }}-trivy-v0.36.0-cache-v1
          restore-keys: |
            ${{ runner.os }}-trivy-

      - name: Run Trivy vulnerability scanner in repo mode
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          format: "sarif"
          output: "trivy-results.sarif"
          ignore-unfixed: true
          scan-type: "fs"
          scanners: "vuln,secret,misconfig"
          severity: "CRITICAL,HIGH"
          trivyignores: ".github/.trivyignore"
          cache-dir: .trivycache
          scan-ref: "."
          skip-dirs: "**/node_modules,**/coverage,**/dist,.git"

      - name: Upload Trivy scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: "trivy-results.sarif"

      - name: Notify on Failure
        if: failure() && github.event_name != 'pull_request'
        uses: bcgov/actions/workflow-notifier@main
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          title: "Analysis Failure: Trivy Scan"
          labels: "failure,security,analysis"

  results:
    name: Analysis Results
    needs: [test-and-sync, trivy]
    if: always() && (! github.event.pull_request.draft)
    runs-on: ubuntu-latest
    steps:
      - name: Check Overall Status
        if: contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled')
        run: |
          echo "At least one analysis job failed or was cancelled."
          exit 1
      - name: Success Message
        run: echo "Analysis completed successfully!"
