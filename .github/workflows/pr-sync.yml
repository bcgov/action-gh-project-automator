name: GH Project Board Sync

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, reopened, synchronize]



permissions:
  contents: read
  issues: write
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Run Sync Engine
        uses: ./.github/actions/sync-engine
        with:
          window_hours: '1'
          verbose: 'true'
          github_token: ${{ secrets.PROJECT_SYNC_TOKEN }}
