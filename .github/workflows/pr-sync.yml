name: GH Project Board Sync

on:
  push:
    branches: [main, feat/*, chore/*]
  pull_request:
    types: [opened, reopened, synchronized]



permissions:
  contents: read
  issues: write
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

jobs:
  test-and-sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "20"
      - name: Run Tests
        shell: bash
        run: |
          npm ci
          npm test
      - name: Run Sync Engine
        uses: ./.github/actions/sync-engine
        with:
          window_hours: '1'
          verbose: 'true'
          github_token: ${{ secrets.PROJECT_SYNC_TOKEN }}
