name: GH Project Board Sync

on:
  pull_request:
    types: [opened, reopened, synchronized]

permissions:
  contents: read
  issues: write
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

jobs:
  test-and-sync:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
      - name: Run Tests
        shell: bash
        run: |
          npm ci
          npm test
      - name: Run Sync Engine
        uses: ./.github/actions/sync-engine
        with:
          window_hours: '1'
          verbose: 'true'
          github_token: ${{ secrets.PROJECT_SYNC_TOKEN }}
