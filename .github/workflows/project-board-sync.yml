name: GH Project Board Sync

on:
  pull_request:
    types: [opened, reopened, synchronized]

permissions:
  contents: read
  issues: write
  pull-requests: write

concurrency:
  group: pr-sync-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - run: |
          npm ci
          npm test

  sync:
    runs-on: ubuntu-latest
    needs: tests
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - run: npm ci
      - name: Run Project Board Sync
        env:
          GITHUB_TOKEN: ${{ secrets.PROJECT_SYNC_TOKEN }}
          GITHUB_AUTHOR: DerekRoberts
          PROJECT_URL: https://github.com/orgs/bcgov/projects/16
          UPDATE_WINDOW_HOURS: '1'
          VERBOSE: 'true'
          CONFIG_FILE: rules.yml
        run: npm run start
