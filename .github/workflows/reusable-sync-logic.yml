name: Reusable Sync Logic

on:
  workflow_call:
    inputs:
      backfill:
        description: 'Backfill repo (org/repo)'
        required: false
        default: ''
        type: string
      window_hours:
        description: 'Update window (hours)'
        required: false
        default: '2'
        type: string
      verbose:
        description: 'Enable verbose logging'
        required: false
        default: 'true'
        type: string
    secrets:
      PROJECT_SYNC_TOKEN:
        required: true

jobs:
  tests:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - run: |
          npm ci
          npm test

  sync:
    runs-on: ubuntu-latest
    needs: tests
    permissions:
      contents: read
      issues: write
      pull-requests: write
    env:
      GITHUB_AUTHOR_DEFAULT: DerekRoberts
      PROJECT_URL: https://github.com/orgs/bcgov/projects/16
      CONFIG_FILE: rules.yml
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install dependencies
        run: npm ci

      - name: Run Project Board Sync
        env:
          GITHUB_TOKEN: ${{ secrets.PROJECT_SYNC_TOKEN }}
          GITHUB_AUTHOR: ${{ env.GITHUB_AUTHOR_DEFAULT }}
          PROJECT_URL: ${{ env.PROJECT_URL }}
          UPDATE_WINDOW_HOURS: ${{ inputs.window_hours }}
          VERBOSE: ${{ inputs.verbose }}
          CONFIG_FILE: ${{ env.CONFIG_FILE }}
          BACKFILL: ${{ inputs.backfill }}
        run: npm run start
