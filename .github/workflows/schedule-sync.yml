name: Scheduled Project Sync

on:
  schedule:
    - cron: "0 * * * *" # hourly
  workflow_dispatch:
    inputs:
      backfill:
        description: 'Backfill repo (org/repo) — searches only that repo without date filter'
        required: false
        default: ''
        type: string
      window_hours:
        description: 'Update window (hours)'
        required: false
        default: '2'
        type: string

permissions:
  contents: read
  issues: write
  pull-requests: write

concurrency:
  group: scheduled-sync-${{ github.ref }}
  cancel-in-progress: true

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - run: |
          npm ci
          npm test

  sync:
    runs-on: ubuntu-latest
    needs: tests
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - run: npm ci
      - name: Run Project Board Sync
        env:
          GITHUB_TOKEN: ${{ secrets.PROJECT_SYNC_TOKEN }}
          GITHUB_AUTHOR: DerekRoberts
          PROJECT_URL: https://github.com/orgs/bcgov/projects/16
          UPDATE_WINDOW_HOURS: ${{ inputs.window_hours || '2' }}
          VERBOSE: 'true'
          CONFIG_FILE: rules.yml
          BACKFILL: ${{ inputs.backfill }}
        run: npm run start
